  :root {
    --bg: #f5f6f1;
    --bg-soft: #e9ebe3;
    --ink: #21261e;
    --muted: #6d7566;
    --accent-x: #1f5fbf;
    --accent-o: #c1382c;
    --grid-ink: #2c3226;
    --win-ink: #21261e;
    --focus: #1f5fbf;
    --shadow: rgba(33, 38, 30, 0.10);
    --noise-opacity: 0;
    color-scheme: light;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #182720;
      --bg-soft: #21352a;
      --ink: #edf1e6;
      --muted: #9cab95;
      --accent-x: #e8c548;
      --accent-o: #ea8a6c;
      --grid-ink: #d9ddd0;
      --win-ink: #f5f7ee;
      --focus: #e8c548;
      --shadow: rgba(0, 0, 0, 0.4);
      --noise-opacity: 0.05;
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg: #182720;
    --bg-soft: #21352a;
    --ink: #edf1e6;
    --muted: #9cab95;
    --accent-x: #e8c548;
    --accent-o: #ea8a6c;
    --grid-ink: #d9ddd0;
    --win-ink: #f5f7ee;
    --focus: #e8c548;
    --shadow: rgba(0, 0, 0, 0.4);
    --noise-opacity: 0.05;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg: #f5f6f1;
    --bg-soft: #e9ebe3;
    --ink: #21261e;
    --muted: #6d7566;
    --accent-x: #1f5fbf;
    --accent-o: #c1382c;
    --grid-ink: #2c3226;
    --win-ink: #21261e;
    --focus: #1f5fbf;
    --shadow: rgba(33, 38, 30, 0.10);
    --noise-opacity: 0;
    color-scheme: light;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    transition: background 0.3s ease, color 0.3s ease;
    padding: 32px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: var(--noise-opacity);
    background-image:
      radial-gradient(circle at 20% 30%, var(--ink) 0.6px, transparent 0.6px),
      radial-gradient(circle at 60% 70%, var(--ink) 0.5px, transparent 0.5px),
      radial-gradient(circle at 80% 20%, var(--ink) 0.7px, transparent 0.7px),
      radial-gradient(circle at 40% 85%, var(--ink) 0.5px, transparent 0.5px);
    background-size: 7px 7px, 11px 11px, 13px 13px, 9px 9px;
    transition: opacity 0.3s ease;
  }

  .stage {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  .masthead {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    text-align: center;
  }

  .title {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: clamp(2.6rem, 9vw, 3.4rem);
    line-height: 1;
    margin: 0;
    letter-spacing: 0.01em;
    text-wrap: balance;
    color: var(--ink);
  }

  .status {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 1.5rem;
    margin: 0;
    min-height: 1.4em;
    color: var(--muted);
    transition: color 0.25s ease;
  }
  .stage[data-turn="X"] .status { color: var(--accent-x); }
  .stage[data-turn="O"] .status { color: var(--accent-o); }
  .stage[data-turn="draw"] .status { color: var(--muted); }

  .board-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    margin: 0 auto;
    max-width: 340px;
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
  }

  .grid-layer path {
    fill: none;
    stroke: var(--grid-ink);
    stroke-width: 3.2;
    stroke-linecap: round;
    opacity: 0.85;
    transition: stroke 0.3s ease;
  }
  .grid-layer path.ghost {
    stroke-width: 5.5;
    opacity: 0.12;
  }

  .mark-layer .stroke-x {
    fill: none;
    stroke: var(--accent-x);
    stroke-width: 7;
    stroke-linecap: round;
  }
  .mark-layer .stroke-o {
    fill: none;
    stroke: var(--accent-o);
    stroke-width: 7;
    stroke-linecap: round;
  }
  .mark-layer g.dim .stroke-x,
  .mark-layer g.dim .stroke-o {
    opacity: 0.32;
  }

  .win-layer path {
    fill: none;
    stroke: var(--win-ink);
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px var(--shadow));
  }

  .board {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
  }

  .cell {
    background: transparent;
    border: 0;
    margin: 0;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .cell:disabled { cursor: default; }
  .cell:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: -6px;
    border-radius: 6px;
  }
  @media (hover: hover) {
    .cell:not(:disabled):hover { background: var(--shadow); border-radius: 6px; }
  }

  .scoreboard {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    background: var(--bg-soft);
    border-radius: 10px;
    padding: 14px 10px;
    transition: background 0.3s ease;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-item .label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .score-item.x .label { color: var(--accent-x); }
  .score-item.o .label { color: var(--accent-o); }
  .score-item .value {
    font-size: 1.5rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .reset-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: transparent;
    border: 1.5px solid var(--muted);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .reset-btn:hover { border-color: var(--ink); background: var(--bg-soft); }
  .reset-btn:active { transform: scale(0.97); }
  .reset-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  .reset-btn svg { width: 14px; height: 14px; }
  .reset-btn svg path {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }
</style>

<div class="stage" id="stage" data-turn="X">
  <header class="masthead">
    <h1 class="title">tic · tac · toe</h1>
    <p class="status" id="status" aria-live="polite">X&rsquo;s turn</p>

  <div class="board-frame">
    <svg class="layer grid-layer" id="gridSvg" viewBox="0 0 300 300" aria-hidden="true"></svg>
    <svg class="layer mark-layer" id="markSvg" viewBox="0 0 300 300" aria-hidden="true"></svg>
    <svg class="layer win-layer" id="winSvg" viewBox="0 0 300 300" aria-hidden="true"></svg>
    <div class="board" id="board" role="grid" aria-label="Tic tac toe board, 3 by 3"></div>
  </div>

  <div class="scoreboard" aria-label="Scoreboard">
    <div class="score-item x">

    </div>
    <div class="score-item o">
      <span class="label">O</span>
      <span class="value" id="scoreO">0</span>
    </div>

  <button class="reset-btn" id="resetBtn" type="button">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>

  </button>
</div>

  }

  function ovalPath(cx, cy, r, rng) {
    var steps = 10;
    var startAngle = rng() * Math.PI * 2;
    var sweep = Math.PI * 2 * (1.05 + rng() * 0.05);
    var pts = [];
    for (var i = 0; i <= steps; i++) {
      var t = i / steps;
      var angle = startAngle + t * sweep;
      var jr = r + (rng() - 0.5) * 5;
      pts.push([cx + Math.cos(angle) * jr, cy + Math.sin(angle) * jr]);
    }
    var d = 'M ' + pts[0][0].toFixed(2) + ' ' + pts[0][1].toFixed(2) + ' ';
    for (var j = 1; j < pts.length; j++) {
      var px = pts[j - 1][0], py = pts[j - 1][1];
      var x = pts[j][0], y = pts[j][1];
      var mx = (px + x) / 2, my = (py + y) / 2;
      d += 'Q ' + px.toFixed(2) + ' ' + py.toFixed(2) + ' ' + mx.toFixed(2) + ' ' + my.toFixed(2) + ' ';
    }
    return d;
  }

  function animateDraw(path, duration) {
    var len = path.getTotalLength();
    path.style.transition = 'none';
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = reduceMotion ? 0 : len;
    if (reduceMotion) return;
    path.getBoundingClientRect();
    requestAnimationFrame(function () {
      path.style.transition = 'stroke-dashoffset ' + duration + 'ms cubic-bezier(.34,.9,.35,1)';
      path.style.strokeDashoffset = 0;
    });
  }

  var gridSvg = document.getElementById('gridSvg');
  var markSvg = document.getElementById('markSvg');
  var winSvg = document.getElementById('winSvg');
  var boardEl = document.getElementById('board');
  var statusEl = document.getElementById('status');
  var stageEl = document.getElementById('stage');
  var resetBtn = document.getElementById('resetBtn');
  var scoreXEl = document.getElementById('scoreX');
  var scoreOEl = document.getElementById('scoreO');
  var scoreDEl = document.getElementById('scoreD');

  var WIN_LINES = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6]
  ];

  var GRID_SEED = 1337;

  function buildGrid() {
    gridSvg.innerHTML = '';
    var rng = mulberry32(GRID_SEED);
    var lines = [
      [100, -10, 100, 310],
      [200, -10, 200, 310],
      [-10, 100, 310, 100],
      [-10, 200, 310, 200]
    ];
    lines.forEach(function (l) {
      var d = wobblyLine(l[0], l[1], l[2], l[3], rng, 5);
      gridSvg.appendChild(svgEl('path', { d: d, class: 'ghost' }));
      gridSvg.appendChild(svgEl('path', { d: wobblyLine(l[0], l[1], l[2], l[3], rng, 5) }));
    });
  }

  function cellCenter(i) {
    var row = Math.floor(i / 3), col = i % 3;
    return [col * 100 + 50, row * 100 + 50];
  }

  var cells = [];
  function buildCells() {
    boardEl.innerHTML = '';
    cells = [];
    for (var i = 0; i < 9; i++) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cell';
      btn.setAttribute('role', 'gridcell');
      btn.setAttribute('data-i', i);
      btn.setAttribute('aria-label', 'row ' + (Math.floor(i / 3) + 1) + ', column ' + (i % 3 + 1) + ', empty');
      btn.addEventListener('click', (function (idx) { return function () { handleMove(idx); }; })(i));
      boardEl.appendChild(btn);
      cells.push(btn);
    }
  }

  var board, current, over, seedBase, markGroups;

  function initRound() {
    board = new Array(9).fill(null);
    current = 'X';
    over = false;
    seedBase = Date.now() % 100000;
    markSvg.innerHTML = '';
    winSvg.innerHTML = '';
    markGroups = new Array(9).fill(null);
    cells.forEach(function (btn, i) {
      btn.disabled = false;
      btn.setAttribute('aria-label', 'row ' + (Math.floor(i / 3) + 1) + ', column ' + (i % 3 + 1) + ', empty');
    });
    stageEl.setAttribute('data-turn', 'X');
    statusEl.textContent = "X’s turn";
  }

  function drawMark(i, player) {
    var c = cellCenter(i);
    var rng = mulberry32(seedBase + i * 97 + (player === 'X' ? 13 : 29));
    var g = svgEl('g', {});
    if (player === 'X') {
      var d1 = wobblyLine(c[0] - 27, c[1] - 27, c[0] + 27, c[1] + 27, rng, 6);
      var d2 = wobblyLine(c[0] + 27, c[1] - 27, c[0] - 27, c[1] + 27, rng, 6);
      var p1 = svgEl('path', { d: d1, class: 'stroke-x' });
      var p2 = svgEl('path', { d: d2, class: 'stroke-x' });
      g.appendChild(p1);
      g.appendChild(p2);
      markSvg.appendChild(g);
      animateDraw(p1, 260);
      setTimeout(function () { animateDraw(p2, 260); }, reduceMotion ? 0 : 150);
    } else {
      var d = ovalPath(c[0], c[1], 30, rng);
      var p = svgEl('path', { d: d, class: 'stroke-o' });
      g.appendChild(p);
      markSvg.appendChild(g);
      animateDraw(p, 420);
    }
    markGroups[i] = g;
  }

  function getWinningCombo() {
    for (var k = 0; k < WIN_LINES.length; k++) {
      var line = WIN_LINES[k];
      var a = board[line[0]], b = board[line[1]], c = board[line[2]];
      if (a && a === b && b === c) return line;
    }
    return null;
  }

  function drawWinLine(combo) {
    var start = cellCenter(combo[0]);
    var end = cellCenter(combo[2]);
    var dx = end[0] - start[0], dy = end[1] - start[1];
    var len = Math.hypot(dx, dy);
    var ux = dx / len, uy = dy / len;
    var sx = start[0] - ux * 30, sy = start[1] - uy * 30;
    var ex = end[0] + ux * 30, ey = end[1] + uy * 30;
    var rng = mulberry32(seedBase + 777);
    var d = wobblyLine(sx, sy, ex, ey, rng, 7);
    var p = svgEl('path', { d: d });
    winSvg.appendChild(p);
    animateDraw(p, 420);
  }

  function dimOtherMarks(combo) {
    markGroups.forEach(function (g, i) {
      if (g && combo.indexOf(i) === -1) g.classList.add('dim');
    });
  }

  function updateScoreUI() {
    scoreXEl.textContent = score.X;
    scoreOEl.textContent = score.O;
    scoreDEl.textContent = score.D;
  }

  var score = { X: 0, O: 0, D: 0 };

  function handleMove(i) {
    if (over || board[i]) return;
    board[i] = current;
    drawMark(i, current);
    cells[i].disabled = true;
    cells[i].setAttribute('aria-label', 'row ' + (Math.floor(i / 3) + 1) + ', column ' + (i % 3 + 1) + ', ' + current);

    var combo = getWinningCombo();
    if (combo) {
      over = true;
      score[current]++;
      updateScoreUI();
      drawWinLine(combo);
      dimOtherMarks(combo);
      cells.forEach(function (btn) { btn.disabled = true; });
      stageEl.setAttribute('data-turn', current);
      statusEl.textContent = current + ' wins!';
      return;
    }
    if (board.every(Boolean)) {
      over = true;
      score.D++;
      updateScoreUI();
      stageEl.setAttribute('data-turn', 'draw');
      statusEl.textContent = "It’s a draw";
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    stageEl.setAttribute('data-turn', current);
    statusEl.textContent = current + "’s turn";
  }

  resetBtn.addEventListener('click', initRound);

  buildGrid();
  buildCells();
  initRound();
  updateScoreUI();
})();
</script>
